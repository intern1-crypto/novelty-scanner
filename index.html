<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ノベルティスキャナー</title>
<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #0f172a; color: #f1f5f9;
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; padding: 16px; gap: 16px;
  }
  h1 { font-size: 18px; font-weight: 600; color: #94a3b8; margin-top: 8px; }
  #video-wrap {
    width: 100%; max-width: 380px; aspect-ratio: 1;
    border-radius: 16px; overflow: hidden; position: relative;
    border: 2px solid #334155;
  }
  video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .scan-box {
    width: 60%; aspect-ratio: 1;
    border: 2px solid #38bdf8;
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  }
  #result-box {
    width: 100%; max-width: 380px;
    background: #1e293b; border-radius: 12px; padding: 16px;
    border: 1px solid #334155; min-height: 100px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
  .value { font-size: 20px; font-weight: 700; color: #f8fafc; }
  .sub   { font-size: 14px; color: #94a3b8; }
  #status {
    font-size: 14px; padding: 12px 16px; border-radius: 8px;
    font-weight: 600; text-align: center; width: 100%; max-width: 380px;
  }
  .status-ok      { background: #064e3b; color: #6ee7b7; }
  .status-error   { background: #450a0a; color: #fca5a5; }
  .status-waiting { background: #1e293b; color: #64748b; }

  /* 次のスキャンに進むための大きなボタン */
  #next-btn {
    width: 100%; max-width: 380px;
    padding: 16px; border-radius: 12px;
    background: #38bdf8; color: #0f172a;
    font-size: 16px; font-weight: 700;
    border: none; cursor: pointer;
    display: none; /* スキャン成功時のみJavaScriptで表示 */
    box-shadow: 0 4px 14px rgba(56, 189, 248, 0.4);
    transition: transform 0.1s ease;
  }
  #next-btn:active { transform: scale(0.98); }
</style>
</head>
<body>
<h1>📦 ノベルティスキャナー</h1>

<div id="video-wrap">
  <video id="video" playsinline muted></video>
  <div id="overlay"><div class="scan-box"></div></div>
</div>

<button id="next-btn">次のお客様のスキャンを開始</button>

<div id="result-box">
  <div class="label">スキャン結果</div>
  <div class="value" id="store-name">—</div>
  <div class="sub"  id="store-info">QRコードをかざしてください</div>
  <div class="sub"  id="count-info"></div>
</div>

<div id="status" class="status-waiting">待機中...</div>

<script>
  // 新しいGASのURLに更新済み
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbw2I75LTYHglXUIaKoeh2k5vI37FjuLQcZwvogxZUy8ED0m70aZSRoV020eWZvEDXig/exec';
  let scanning = true;
  const codeReader = new ZXing.BrowserMultiFormatReader();

  // ブラウザで「ピピッ」という電子音を合成して鳴らす関数
  function playBeep() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime); // 音の高さ (1000Hz)
      gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);       // 音量 (5%)
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.08); // 音の長さ (0.08秒)
    } catch (e) {
      console.error('Audio error:', e);
    }
  }

  const constraints = {
    video: {
      facingMode: { ideal: 'environment' },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  };

  navigator.mediaDevices.getUserMedia(constraints)
    .then(stream => {
      document.getElementById('video').srcObject = stream;
      document.getElementById('video').play();
      codeReader.decodeFromStream(stream, 'video', (result, err) => {
        if (!result) return;
        if (!scanning) return; // ボタンが押されるまで次のQRは100%無視する（重複防止）
        
        scanning = false; // 即座にスキャンをロック
        sendToGAS(result.getText());
      });
    })
    .catch(err => {
      setStatus('⚠ カメラが使えません: ' + err.message, 'error');
    });

  // JSONP方式でGASに送信
  function sendToGAS(qr) {
    setStatus('送信中...', '');
    const callbackName = 'cb_' + Date.now();
    window[callbackName] = function(data) {
      document.getElementById('cb-script') && document.getElementById('cb-script').remove();
      
      if (data.ok) {
        document.getElementById('store-name').textContent = data.storeName;
        document.getElementById('store-info').textContent = '案件ID: ' + data.projectId + ' 店舗番号: ' + data.storeNo;
        document.getElementById('count-info').textContent = 'この店舗の累計: ' + data.count + ' 個';
        setStatus('✓ 記録しました（' + data.timestamp + '）', 'ok');
        
        playBeep();
        navigator.vibrate && navigator.vibrate(80);
      } else {
        setStatus('⚠ エラー: ' + data.error, 'error');
      }
      
      // 成功・失敗に関わらず、処理が終わったら「次へ進む」ボタンを表示してスタッフの操作を待つ
      document.getElementById('next-btn').style.display = 'block';
      delete window[callbackName];
    };
    
    const script = document.createElement('script');
    script.id  = 'cb-script';
    script.src = GAS_URL + '?callback=' + callbackName + '&qr=' + encodeURIComponent(qr);
    script.onerror = () => {
      setStatus('⚠ 通信エラー。ネットを確認してください。', 'error');
      document.getElementById('next-btn').style.display = 'block';
    };
    document.body.appendChild(script);
  }

  // 「次のお客様のスキャンを開始」ボタンが押された時の処理
  document.getElementById('next-btn').onclick = function() {
    this.style.display = 'none'; // ボタンを隠す
    
    // 画面の表示を初期状態に戻す
    document.getElementById('store-name').textContent = '—';
    document.getElementById('store-info').textContent = 'QRコードをかざしてください';
    document.getElementById('count-info').textContent = '';
    setStatus('待機中...', 'waiting');
    
    // スキャンロックを解除し、次の読み取りを再開する
    scanning = true;
  };

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status-' + (type || 'waiting');
  }
</script>
</body>
</html>
